<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>SmoothyStudio</title>
  <!--
    Same construction as the SmoothyRec mark: a macOS squircle in a navy
    gradient, one bold flat glyph in the brand accent, and the detail knocked
    out of the glyph in the background colour rather than drawn on top of it.
    SmoothyRec's accent is green and its glyph is a camera; this one is
    blueberry and the glyph is a 16:9 canvas with a title "T" cut out of it —
    a thumbnail with type on it, which is what the app makes.
  -->
  <defs>
    <linearGradient id="bg" x1="512" y1="64" x2="512" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A1B38"/>
      <stop offset="1" stop-color="#000418"/>
    </linearGradient>
    <linearGradient id="accent" x1="232" y1="312" x2="792" y2="712" gradientUnits="userSpaceOnUse">
      <stop stop-color="#68A9FF"/>
      <stop offset="1" stop-color="#2E7BF6"/>
    </linearGradient>
    <filter id="lift" x="140" y="240" width="744" height="600" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000418" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Squircle plate -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg)"/>

  <!-- Canvas + knocked-out T, drawn as one even-odd path so the counter shows
       the plate through rather than being painted over it. -->
  <g filter="url(#lift)">
    <path fill-rule="evenodd" clip-rule="evenodd" fill="url(#accent)" d="
      M 264 296
      H 760
      A 56 56 0 0 1 816 352
      V 672
      A 56 56 0 0 1 760 728
      H 264
      A 56 56 0 0 1 208 672
      V 352
      A 56 56 0 0 1 264 296
      Z
      M 356 404
      H 668
      V 470
      H 545
      V 640
      H 479
      V 470
      H 356
      Z
    "/>
  </g>
</svg>
